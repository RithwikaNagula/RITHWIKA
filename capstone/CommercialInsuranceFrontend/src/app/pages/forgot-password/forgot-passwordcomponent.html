<div
    class="min-h-screen flex items-center justify-center bg-taupe-50 dark:bg-[#140E0F] relative overflow-hidden px-6 py-16">
    <!-- Background blobs -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div
            class="absolute top-[-15%] right-[-10%] w-[50%] h-[50%] bg-taupe-200/30 dark:bg-taupe-800/15 rounded-full blur-[140px]">
        </div>
        <div
            class="absolute bottom-[-15%] left-[-10%] w-[50%] h-[50%] bg-taupe-100/40 dark:bg-[#1C1517]/40 rounded-full blur-[140px]">
        </div>
    </div>

    <!-- Card -->
    <div class="w-full max-w-[440px] relative z-10">
        <div class="bg-white dark:bg-[#1C1517] rounded-[2rem] border border-taupe-200 dark:border-[#2E2122] px-10 py-12 transition-all duration-500"
            style="box-shadow: 0 4px 16px rgba(0,0,0,0.04), 0 20px 60px -12px rgba(144,126,128,0.16);">

            <!-- Header -->
            <div class="text-center mb-10">
                <!-- Icon -->
                <div class="w-14 h-14 bg-taupe-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-md"
                    style="box-shadow: 0 8px 24px -4px rgba(144,126,128,0.40);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 style="font-family: 'DM Serif Display', Georgia, serif;"
                    class="text-4xl text-taupe-900 dark:text-white mb-3 leading-tight">Reset Password</h2>
                <p class="text-taupe-400 text-sm font-medium">Enter your email and we'll send a reset link</p>
            </div>

            <form class="space-y-6" (ngSubmit)="onSubmit()">

                <!-- Email -->
                <div class="space-y-2">
                    <label for="email-address"
                        class="block text-[11px] font-bold text-taupe-500 dark:text-taupe-400 uppercase tracking-[0.15em]">
                        Email Address
                    </label>
                    <div class="relative group/input">
                        <input id="email-address" name="email" type="email" autocomplete="email" required
                            [(ngModel)]="email"
                            class="w-full bg-taupe-50 dark:bg-[#140E0F] border border-taupe-200 dark:border-[#2E2122] rounded-xl px-5 py-4 pl-12 text-sm text-taupe-900 dark:text-white placeholder:text-taupe-300 dark:placeholder:text-taupe-600 focus:bg-white dark:focus:bg-[#221A1B] focus:border-taupe-400 outline-none transition-all duration-300"
                            style="box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);" placeholder="name@company.com">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-taupe-300 dark:text-taupe-600 group-focus-within/input:text-taupe-500 transition-colors duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- New Password -->
                <div class="space-y-2">
                    <label for="password"
                        class="block text-[11px] font-bold text-taupe-500 dark:text-taupe-400 uppercase tracking-[0.15em]">
                        New Password
                    </label>
                    <div class="relative group/input">
                        <input id="password" name="password" type="password" required [(ngModel)]="newPassword"
                            class="w-full bg-taupe-50 dark:bg-[#140E0F] border border-taupe-200 dark:border-[#2E2122] rounded-xl px-5 py-4 pl-12 text-sm font-medium text-taupe-900 dark:text-white placeholder:text-taupe-300 dark:placeholder:text-taupe-600 focus:bg-white dark:focus:bg-[#221A1B] focus:border-taupe-400 outline-none transition-all duration-300"
                            style="box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);" placeholder="Min. 6 characters">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-taupe-300 dark:text-taupe-600 group-focus-within/input:text-taupe-500 transition-colors duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Error -->
                <div *ngIf="error()"
                    class="p-4 bg-rose-50 dark:bg-rose-900/10 border border-rose-200 dark:border-rose-900/30 rounded-xl">
                    <div class="flex items-center gap-2.5">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="h-4 w-4 text-rose-500 dark:text-rose-400 shrink-0" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                        <span class="text-xs font-semibold text-rose-700 dark:text-rose-400 leading-tight">{{ error()
                            }}</span>
                    </div>
                </div>

                <!-- Success -->
                <div *ngIf="success()"
                    class="p-4 bg-emerald-50 dark:bg-emerald-900/10 border border-emerald-200 dark:border-emerald-900/30 rounded-xl">
                    <div class="flex items-center gap-2.5">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="h-4 w-4 text-emerald-500 dark:text-emerald-400 shrink-0" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd" />
                        </svg>
                        <span class="text-xs font-semibold text-emerald-700 dark:text-emerald-400 leading-tight">{{
                            success() }}</span>
                    </div>
                </div>

                <!-- Submit -->
                <button *ngIf="!success()" type="submit" [disabled]="loading()"
                    class="w-full bg-taupe-600 hover:bg-taupe-700 disabled:bg-taupe-200 dark:disabled:bg-taupe-800/60 text-white disabled:text-taupe-400 rounded-xl py-4 px-8 transition-all duration-300 flex items-center justify-center gap-3 font-bold text-[11px] uppercase tracking-[0.18em]"
                    style="box-shadow: 0 4px 12px rgba(144,126,128,0.25), 0 12px 32px -8px rgba(144,126,128,0.30);">
                    <span *ngIf="!loading()">Reset Password</span>
                    <span *ngIf="loading()" class="animate-pulse">Processing...</span>
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-8 pt-6 border-t border-taupe-100 dark:border-[#2E2122] text-center">
                <a routerLink="/login"
                    class="text-xs font-bold text-taupe-500 hover:text-taupe-700 dark:hover:text-taupe-300 uppercase tracking-wider transition-colors">
                    ← Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
