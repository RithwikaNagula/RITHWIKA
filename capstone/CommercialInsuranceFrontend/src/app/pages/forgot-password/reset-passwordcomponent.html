<div
    class="min-h-screen flex items-center justify-center bg-taupe-50 dark:bg-[#1A1314] relative overflow-hidden px-6 py-20">
    <div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
        <div
            class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-taupe-200 dark:bg-taupe-800 rounded-full blur-[120px]">
        </div>
        <div
            class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-taupe-100 dark:bg-[#201819] rounded-full blur-[120px]">
        </div>
    </div>

    <div class="w-full max-w-[380px] relative z-10 group">
        <div
            class="bg-white dark:bg-[#1A1314] rounded-3xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.06)] border border-white dark:border-taupe-800 p-10 transition-all duration-500">
            <div class="text-center mb-10">
                <div
                    class="w-16 h-16 bg-taupe-500 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-taupe-100 dark:border-taupe-800 transition-transform duration-500 shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-extrabold text-taupe-700 dark:text-taupe-300 tracking-tight leading-none mb-2">
                    Reset Password</h2>
                <p class="text-taupe-400 font-medium text-sm">Enter your new password below</p>
            </div>

            <form class="space-y-6" (ngSubmit)="onSubmit()">
                <div class="space-y-2">
                    <label for="email" class="text-[11px] font-bold text-taupe-400 uppercase tracking-widest ml-1">Email
                        Address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required [(ngModel)]="email"
                        readonly
                        class="w-full bg-taupe-50 dark:bg-[#1A1314] border border-taupe-100 dark:border-taupe-800 rounded-xl px-6 py-4 text-sm font-bold text-taupe-400 outline-none">
                </div>

                <div class="space-y-2">
                    <label for="password"
                        class="text-[11px] font-bold text-taupe-400 uppercase tracking-widest ml-1">New Password</label>
                    <div class="relative group/input">
                        <input id="password" name="password" type="password" required [(ngModel)]="newPassword"
                            class="w-full bg-taupe-50 dark:bg-[#1A1314] border border-taupe-100 dark:border-taupe-800 rounded-xl px-6 py-4 pl-12 text-sm font-bold text-taupe-900 dark:text-white focus:bg-white focus:border-taupe-500 outline-none transition-all duration-300"
                            placeholder="••••••••">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-taupe-300 group-focus-within/input:text-taupe-500 transition-colors duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div *ngIf="error()"
                    class="p-4 bg-rose-50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-900/30 rounded-xl">
                    <span
                        class="text-[10px] font-bold text-rose-700 dark:text-rose-400 uppercase tracking-widest leading-tight">{{
                        error()
                        }}</span>
                </div>

                <div *ngIf="success()"
                    class="p-4 bg-emerald-50 dark:bg-emerald-900/10 border border-emerald-100 dark:border-emerald-900/30 rounded-xl">
                    <span
                        class="text-[10px] font-bold text-emerald-700 dark:text-emerald-400 uppercase tracking-widest leading-tight">{{
                        success() }}</span>
                </div>

                <button *ngIf="!success()" type="submit" [disabled]="loading()"
                    class="w-full bg-taupe-700 hover:bg-taupe-800 disabled:bg-taupe-200 text-white rounded-xl py-3.5 px-8 transition-all duration-300 shadow-lg shadow-taupe-900/10 flex items-center justify-center gap-3">
                    <span *ngIf="!loading()" class="text-[11px] font-bold uppercase tracking-[0.2em]">Reset
                        Password</span>
                    <span *ngIf="loading()"
                        class="text-[11px] font-bold uppercase tracking-[0.2em] animate-pulse">Processing...</span>
                </button>

                <a *ngIf="success()" routerLink="/login"
                    class="w-full bg-taupe-700 hover:bg-taupe-800 text-white rounded-xl py-3.5 px-8 transition-all duration-300 uppercase text-[11px] font-bold tracking-widest flex items-center justify-center">
                    Go to Login
                </a>
            </form>
        </div>
    </div>
</div>
