<div
    class="min-h-screen flex items-center justify-center bg-brand-50 dark:bg-brand-800 relative overflow-hidden px-6 py-20">
    <div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
        <div
            class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-brand-200 dark:bg-brand-800 rounded-full blur-[120px]">
        </div>
        <div
            class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-100 dark:bg-brand-800 rounded-full blur-[120px]">
        </div>
    </div>

    <div class="w-full max-w-[380px] relative z-10 group">
        <div
            class="bg-white dark:bg-brand-800 rounded-3xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.06)] border border-white dark:border-brand-800 p-10 transition-all duration-500">
            <div class="text-center mb-10">
                <div
                    class="w-16 h-16 bg-brand-500 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-brand-100 dark:border-brand-800 transition-transform duration-500 shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-extrabold text-brand-700 dark:text-brand-300 tracking-tight leading-none mb-2">
                    Reset Password</h2>
                <p class="text-brand-400 font-medium text-sm">Enter your new password below</p>
            </div>
            <!-- Main Form Wrapper -->
            <form (ngSubmit)="onSubmit()" #resetForm="ngForm" class="space-y-5">
                <div class="space-y-2">
                    <label for="email" class="text-sm font-bold text-brand-400 uppercase tracking-widest ml-1">Email
                        Address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required [(ngModel)]="email"
                        readonly
                        class="w-full bg-brand-50 dark:bg-brand-800 border border-brand-100 dark:border-brand-800 rounded-xl px-6 py-4 text-sm font-bold text-brand-400 outline-none">
                </div>

                <div class="space-y-2">
                    <label for="password" class="text-sm font-bold text-brand-400 uppercase tracking-widest ml-1">New
                        Password</label>
                    <div class="relative group/input">
                        <input id="password" name="password" type="password" required [(ngModel)]="newPassword"
                            class="w-full bg-brand-50 dark:bg-brand-800 border border-brand-100 dark:border-brand-800 rounded-xl px-6 py-4 pl-12 text-sm font-bold text-brand-900 dark:text-white focus:bg-white focus:border-gray-500 outline-none transition-all duration-300"
                            placeholder="••••••••">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-300 group-focus-within/input:text-brand-500 transition-colors duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div *ngIf="error()"
                    class="p-4 bg-rose-50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-900/30 rounded-xl">
                    <span
                        class="text-sm font-bold text-rose-700 dark:text-rose-400 uppercase tracking-widest leading-tight">{{
                        error()
                        }}</span>
                </div>

                <div *ngIf="success()"
                    class="p-4 bg-emerald-50 dark:bg-emerald-900/10 border border-emerald-100 dark:border-emerald-900/30 rounded-xl">
                    <span
                        class="text-sm font-bold text-emerald-700 dark:text-emerald-400 uppercase tracking-widest leading-tight">{{
                        success() }}</span>
                </div>
                <!-- Submit Action -->
                <button type="submit" [disabled]="resetForm.invalid || loading()"
                    class="w-full bg-brand-900 hover:bg-brand-800 dark:bg-white dark:hover:bg-brand-100 text-white dark:text-brand-100 rounded-xl py-4 transition-all duration-300 shadow-[0_8px_16px_-6px_rgba(0,0,0,0.1)] hover:shadow-[0_12px_20px_-8px_rgba(0,0,0,0.15)] hover:-translate-y-0.5 mt-6 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <span *ngIf="!loading()" class="text-sm font-bold uppercase tracking-wide">Reset
                        Password</span>
                    <span *ngIf="loading()"
                        class="text-sm font-bold uppercase tracking-wide animate-pulse">Processing...</span>
                </button>

                <a *ngIf="success()" routerLink="/login"
                    class="w-full bg-gray-700 hover:bg-brand-800 text-white rounded-xl py-3.5 px-8 transition-all duration-300 uppercase text-sm font-bold tracking-widest flex items-center justify-center">
                    Go to Login
                </a>
            </form>
        </div>
    </div>
</div>
