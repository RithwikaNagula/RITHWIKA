<div
  class="min-h-screen flex items-center justify-center bg-brand-50 dark:bg-brand-800 relative overflow-hidden px-6 py-16 transition-colors duration-500">

  <!-- Decorative Background Elements -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div
      class="absolute top-[-20%] right-[-10%] w-[60%] h-[60%] bg-brand-200/20 dark:bg-brand-500/5 rounded-full blur-[160px]">
    </div>
    <div
      class="absolute bottom-[-20%] left-[-10%] w-[60%] h-[60%] bg-brand-100/30 dark:bg-brand-900/40 rounded-full blur-[160px]">
    </div>
  </div>

  <!-- Card Container -->
  <div class="w-full max-w-[460px] relative z-10">

    <div
      class="bg-white dark:bg-brand-800 rounded-[2.5rem] border border-brand-100 dark:border-brand-700/50 px-8 sm:px-10 py-12 shadow-2xl shadow-brand-900/10 dark:shadow-black/60 transition-all duration-500">

      <!-- Branding & Title -->
      <div class="text-center mb-10">
        <h2 class="text-4xl text-brand-800 dark:text-white mb-3 font-extrabold tracking-tight">Welcome Back</h2>
        <p class="text-brand-400 dark:text-brand-500 text-sm font-medium">Please enter your access details</p>
      </div>

      <form class="space-y-6" (ngSubmit)="onSubmit()">

        <!-- Email Field -->
        <div class="space-y-2">
          <label for="email-address" class="input-label">Email Address</label>
          <input id="email-address" name="email" type="email" autocomplete="email" required [(ngModel)]="email"
            class="input-field" placeholder="name@company.com">
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
          <div class="flex items-center justify-between px-1">
            <label for="password" class="input-label !mb-0">Password</label>
            <a routerLink="/forgot-password"
              class="text-[10px] font-bold text-brand-400 hover:text-brand-600 dark:hover:text-brand-300 uppercase tracking-widest transition-colors">
              Reset?
            </a>
          </div>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            [(ngModel)]="password" class="input-field" placeholder="••••••••">
        </div>

        <!-- Security Verification -->
        <div class="space-y-2">
          <label
            class="block text-[11px] font-black text-brand-500 dark:text-brand-400 uppercase tracking-[0.2em] px-1">
            Security Check
          </label>
          <div class="px-0">
            <app-captcha (captchaValid)="onCaptchaValid($event)"></app-captcha>
          </div>
        </div>

        <!-- Global Feedback Message -->
        <div *ngIf="error()"
          class="p-4 bg-rose-50 dark:bg-rose-950/20 border border-rose-100 dark:border-rose-900/30 rounded-2xl animate-fade-in">
          <div class="flex items-center gap-3">
            <div class="w-1.5 h-1.5 rounded-full bg-rose-500"></div>
            <span class="text-[10px] font-black text-rose-700 dark:text-rose-400 uppercase tracking-widest">{{ error()
              }}</span>
          </div>
        </div>

        <!-- Sign In Action -->
        <div class="pt-2">
          <button type="submit" [disabled]="loading() || !captchaVerified()"
            class="w-full h-14 bg-brand-500 hover:bg-brand-600 disabled:opacity-40 disabled:grayscale text-white rounded-2xl transition-all duration-300 flex items-center justify-center gap-4 group/btn font-black text-[11px] uppercase tracking-[0.2em] shadow-xl shadow-brand-500/10 active:scale-[0.98] outline-none">
            <span *ngIf="!loading()">Login</span>
            <span *ngIf="loading()" class="flex items-center gap-2">
              <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
              </svg>
            </span>
          </button>
        </div>
      </form>

      <!-- External Links -->
      <div class="mt-10 pt-8 border-t border-brand-100 dark:border-brand-700/50 text-center">
        <p class="text-[11px] text-brand-400 dark:text-brand-500 font-bold uppercase tracking-widest">
          New to InsureDesk?
          <a routerLink="/register"
            class="text-brand-600 dark:text-brand-400 hover:text-brand-800 dark:hover:text-white font-black ml-2 transition-colors border-b-2 border-brand-500/0 hover:border-brand-500 pb-0.5">
            Register Account
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
