<div
  class="min-h-screen bg-brand-50 dark:bg-brand-800 flex items-center justify-center py-10 px-6 relative overflow-hidden">
  <!-- Decorative Elements -->
  <div
    class="absolute top-0 right-0 w-[40%] h-[40%] bg-brand-100/30 dark:bg-brand-800/30 rounded-full blur-[120px] pointer-events-none">
  </div>
  <div
    class="absolute bottom-0 left-0 w-[40%] h-[40%] bg-brand-50/50 dark:bg-brand-800/50 rounded-full blur-[120px] pointer-events-none">
  </div>

  <div class="w-full max-w-[480px] relative z-10">
    <div
      class="bg-white dark:bg-brand-800 rounded-[2.5rem] shadow-[0_24px_48px_-12px_rgba(0,0,0,0.04)] border border-white dark:border-brand-800 p-8 hover:shadow-[0_32px_64px_-16px_rgba(0,0,0,0.08)] transition-all duration-500">
      <!-- Sophisticated Header -->
      <div class="text-center mb-6">
        <div
          class="w-12 h-12 bg-brand-50 dark:bg-brand-800 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner border border-gray-50 dark:border-brand-800">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-600 dark:text-brand-400" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
        </div>
        <span class="text-sm font-bold text-brand-600 dark:text-brand-400 uppercase tracking-widest mb-2 block">Business
          Information</span>
        <h2 class="text-2xl font-extrabold text-[#0f172a] dark:text-white tracking-tight mb-2">Business Profile</h2>
        <p class="text-brand-400 font-medium text-sm leading-relaxed px-4">Enter your business details to unlock
          coverage</p>
      </div>

      <!-- Refined Form -->
      <!-- Main Form Wrapper -->
      <form (ngSubmit)="onSubmit()" #bpForm="ngForm" class="space-y-6">

        <div class="space-y-4">
          <div class="space-y-2">
            <label class="input-label">Business Name</label>
            <input type="text" [(ngModel)]="profile.businessName" name="businessName" required minlength="3"
              #bName="ngModel" class="input-field" placeholder="e.g. Acme Tech Solutions LLC"
              [ngClass]="{'border-rose-400': bName.invalid && bName.touched}">
            <div *ngIf="bName.invalid && (bName.dirty || bName.touched)" class="flex items-center gap-1.5 mt-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-rose-500" viewBox="0 0 20 20"
                fill="currentColor">
                <path fill-rule="evenodd"
                  d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                  clip-rule="evenodd" />
              </svg>
              <span class="text-sm font-bold text-rose-500 uppercase tracking-wider"
                *ngIf="bName.errors?.['required']">Required</span>
              <span class="text-sm font-bold text-rose-500 uppercase tracking-wider"
                *ngIf="bName.errors?.['minlength']">Min 3 characters</span>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="input-label">Vertical Sector</label>
              <div class="relative">
                <select [(ngModel)]="profile.industry" name="industry" required #bIndustry="ngModel"
                  class="input-field appearance-none"
                  [ngClass]="{'border-rose-400': bIndustry.invalid && bIndustry.touched}">
                  <option value="" disabled selected>Select Sector</option>
                  <option value="Technology">Technology & Software</option>
                  <option value="Healthcare">Healthcare & Pharmaceuticals</option>
                  <option value="Manufacturing">Manufacturing & Engineering</option>
                  <option value="Retail">Retail & E-Commerce</option>
                  <option value="Construction">Construction & Real Estate</option>
                  <option value="Finance">Finance & Banking</option>
                  <option value="Education">Education & Training</option>
                  <option value="Logistics">Logistics & Transportation</option>
                  <option value="Hospitality">Hospitality & Tourism</option>
                  <option value="Agriculture">Agriculture & Agritech</option>
                  <option value="Energy">Energy & Utilities</option>
                  <option value="Media">Media & Entertainment</option>
                  <option value="Legal">Legal & Consulting</option>
                  <option value="Food">Food & Beverage</option>
                  <option value="Other">Other</option>
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-brand-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>
              <div *ngIf="bIndustry.invalid && (bIndustry.dirty || bIndustry.touched)"
                class="flex items-center gap-1.5 mt-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-rose-500" viewBox="0 0 20 20"
                  fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
                </svg>
                <span class="text-sm font-bold text-rose-500 uppercase tracking-wider">Please select a sector</span>
              </div>
            </div>

            <div class="space-y-2">
              <label class="input-label">Operating City</label>
              <div class="relative">
                <select [(ngModel)]="profile.city" name="city" required #bCity="ngModel"
                  class="input-field appearance-none" [ngClass]="{'border-rose-400': bCity.invalid && bCity.touched}">
                  <option value="" disabled selected>Select City</option>
                  <option value="Mumbai">Mumbai</option>
                  <option value="Delhi">Delhi</option>
                  <option value="Bengaluru">Bengaluru</option>
                  <option value="Hyderabad">Hyderabad</option>
                  <option value="Chennai">Chennai</option>
                  <option value="Kolkata">Kolkata</option>
                  <option value="Pune">Pune</option>
                  <option value="Ahmedabad">Ahmedabad</option>
                  <option value="Surat">Surat</option>
                  <option value="Jaipur">Jaipur</option>
                  <option value="Lucknow">Lucknow</option>
                  <option value="Chandigarh">Chandigarh</option>
                  <option value="Bhopal">Bhopal</option>
                  <option value="Indore">Indore</option>
                  <option value="Kochi">Kochi</option>
                  <option value="Visakhapatnam">Visakhapatnam</option>
                  <option value="Coimbatore">Coimbatore</option>
                  <option value="Nagpur">Nagpur</option>
                  <option value="Other">Other</option>
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-brand-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>
              <div *ngIf="bCity.invalid && (bCity.dirty || bCity.touched)" class="flex items-center gap-1.5 mt-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-rose-500" viewBox="0 0 20 20"
                  fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
                </svg>
                <span class="text-sm font-bold text-rose-500 uppercase tracking-wider">Please select a city</span>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="input-label">Gross Annual Revenue (&#8377;)</label>
              <div class="relative">
                <select [(ngModel)]="profile.annualRevenue" name="annualRevenue" required #bRevenue="ngModel"
                  class="input-field appearance-none"
                  [ngClass]="{'border-rose-400': bRevenue.invalid && bRevenue.touched}">
                  <option value="" disabled selected>Select Revenue Range</option>
                  <option [ngValue]="500000">Up to ₹5 Lakh</option>
                  <option [ngValue]="1000000">₹5 Lakh – ₹10 Lakh</option>
                  <option [ngValue]="2500000">₹10 Lakh – ₹25 Lakh</option>
                  <option [ngValue]="5000000">₹25 Lakh – ₹50 Lakh</option>
                  <option [ngValue]="10000000">₹50 Lakh – ₹1 Crore</option>
                  <option [ngValue]="25000000">₹1 Crore – ₹2.5 Crore</option>
                  <option [ngValue]="50000000">₹2.5 Crore – ₹5 Crore</option>
                  <option [ngValue]="100000000">₹5 Crore – ₹10 Crore</option>
                  <option [ngValue]="250000000">₹10 Crore – ₹25 Crore</option>
                  <option [ngValue]="500000000">Above ₹25 Crore</option>
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-brand-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>
              <div *ngIf="bRevenue.invalid && (bRevenue.dirty || bRevenue.touched)"
                class="flex items-center gap-1.5 mt-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-rose-500" viewBox="0 0 20 20"
                  fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
                </svg>
                <span class="text-sm font-bold text-rose-500 uppercase tracking-wider">Please select a revenue
                  range</span>
              </div>
            </div>

            <div class="space-y-2">
              <label class="input-label">Headcount</label>
              <div class="relative">
                <select [(ngModel)]="profile.employeeCount" name="employeeCount" required #bEmp="ngModel"
                  class="input-field appearance-none" [ngClass]="{'border-rose-400': bEmp.invalid && bEmp.touched}">
                  <option value="" disabled selected>Select Employee Range</option>
                  <option [ngValue]="1">1 – 10 (Micro)</option>
                  <option [ngValue]="11">11 – 25 (Small)</option>
                  <option [ngValue]="26">26 – 50 (Small+)</option>
                  <option [ngValue]="51">51 – 100 (Mid-size)</option>
                  <option [ngValue]="101">101 – 250 (Mid-size+)</option>
                  <option [ngValue]="251">251 – 500 (Large)</option>
                  <option [ngValue]="501">501 – 1000 (Large+)</option>
                  <option [ngValue]="1001">1001 – 5000 (Enterprise)</option>
                  <option [ngValue]="5001">5000+ (Conglomerate)</option>
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-brand-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>
              <div *ngIf="bEmp.invalid && (bEmp.dirty || bEmp.touched)" class="flex items-center gap-1.5 mt-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-rose-500" viewBox="0 0 20 20"
                  fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
                </svg>
                <span class="text-sm font-bold text-rose-500 uppercase tracking-wider">Please select a headcount
                  range</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Error Handling -->
        <div *ngIf="errorMessage()"
          class="p-4 bg-rose-50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-900/30 rounded-2xl">
          <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-rose-600 dark:text-rose-400" viewBox="0 0 20 20"
              fill="currentColor">
              <path fill-rule="evenodd"
                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                clip-rule="evenodd" />
            </svg>
            <span class="text-sm font-bold text-rose-700 dark:text-rose-400 uppercase tracking-widest italic">{{
              errorMessage()
              }}</span>
          </div>
        </div>

        <!-- Submit Action -->
        <div class="pt-2">
          <button type="submit" [disabled]="loading() || bpForm.invalid" class="btn-primary w-full py-4">
            <span *ngIf="!loading()" class="relative flex items-center justify-center gap-3">
              Save Profile
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
              </svg>
            </span>
            <span *ngIf="loading()" class="relative flex items-center justify-center gap-3 animate-pulse">
              Saving Profile...
            </span>
          </button>

          <div class="mt-4 text-center">
            <p
              class="text-xs font-bold text-brand-300 uppercase tracking-widest flex items-center justify-center gap-2 italic">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-2.5 h-2.5">
                <path fill-rule="evenodd"
                  d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z"
                  clip-rule="evenodd" />
              </svg>
              Safe & Secure Business Audit
            </p>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
