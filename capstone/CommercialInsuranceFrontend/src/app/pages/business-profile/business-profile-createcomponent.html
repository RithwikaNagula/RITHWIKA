<div
  class="min-h-screen bg-taupe-50 dark:bg-[#1A1314] flex items-center justify-center py-10 px-6 relative overflow-hidden">
  <!-- Decorative Elements -->
  <div
    class="absolute top-0 right-0 w-[40%] h-[40%] bg-taupe-100/30 dark:bg-[#201819]/30 rounded-full blur-[120px] pointer-events-none">
  </div>
  <div
    class="absolute bottom-0 left-0 w-[40%] h-[40%] bg-taupe-50/50 dark:bg-[#1A1314]/50 rounded-full blur-[120px] pointer-events-none">
  </div>

  <div class="w-full max-w-[480px] relative z-10">
    <div
      class="bg-white dark:bg-[#1A1314] rounded-[2.5rem] shadow-[0_24px_48px_-12px_rgba(0,0,0,0.04)] border border-white dark:border-taupe-800 p-8 hover:shadow-[0_32px_64px_-16px_rgba(0,0,0,0.08)] transition-all duration-500">
      <!-- Sophisticated Header -->
      <div class="text-center mb-6">
        <div
          class="w-12 h-12 bg-taupe-50 dark:bg-[#1A1314] rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner border border-taupe-50 dark:border-taupe-800">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-taupe-600 dark:text-taupe-400" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
        </div>
        <span
          class="text-[10px] font-bold text-taupe-600 dark:text-taupe-400 uppercase tracking-widest mb-2 block">Corporate
          Identity</span>
        <h2 class="text-2xl font-extrabold text-[#0f172a] dark:text-white tracking-tight mb-2">Business Profile</h2>
        <p class="text-taupe-400 font-medium text-[11px] leading-relaxed px-4">Sync company credentials to unlock
          coverage</p>
      </div>

      <!-- Refined Form -->
      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="space-y-4">
          <div class="space-y-2">
            <label class="input-label">Legal Entity Name</label>
            <input type="text" [(ngModel)]="profile.businessName" name="businessName" title="Business Legal Name"
              required class="input-field" placeholder="e.g. Acme Tech Solutions LLC">
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="input-label">Vertical Sector</label>
              <div class="relative">
                <select [(ngModel)]="profile.industry" name="industry" title="Industry" required
                  class="input-field appearance-none">
                  <option value="" disabled selected>Select Sector</option>
                  <option value="Technology">Technology</option>
                  <option value="Healthcare">Healthcare</option>
                  <option value="Manufacturing">Manufacturing</option>
                  <option value="Retail">Retail</option>
                  <option value="Construction">Construction</option>
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-taupe-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>
            </div>

            <div class="space-y-2">
              <label class="input-label">Operating City</label>
              <input type="text" [(ngModel)]="profile.city" name="city" title="City" required class="input-field"
                placeholder="e.g. Mumbai">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="input-label">Gross Revenue (₹)</label>
              <input type="number" [(ngModel)]="profile.annualRevenue" name="annualRevenue" title="Annual Revenue"
                required class="input-field" placeholder="e.g. 5,000,000">
            </div>

            <div class="space-y-2">
              <label class="input-label">Headcount</label>
              <input type="number" [(ngModel)]="profile.employeeCount" name="employeeCount" title="Employee Count"
                required class="input-field" placeholder="e.g. 50">
            </div>
          </div>
        </div>

        <!-- Error Handling -->
        <div *ngIf="errorMessage()"
          class="p-4 bg-rose-50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-900/30 rounded-2xl">
          <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-rose-600 dark:text-rose-400" viewBox="0 0 20 20"
              fill="currentColor">
              <path fill-rule="evenodd"
                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                clip-rule="evenodd" />
            </svg>
            <span class="text-[10px] font-bold text-rose-700 dark:text-rose-400 uppercase tracking-widest italic">{{
              errorMessage()
              }}</span>
          </div>
        </div>

        <!-- Submit Action -->
        <div class="pt-2">
          <button type="submit" [disabled]="loading()" class="btn-primary w-full py-4">
            <span *ngIf="!loading()" class="relative flex items-center justify-center gap-3">
              Deploy Configuration
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
              </svg>
            </span>
            <span *ngIf="loading()" class="relative flex items-center justify-center gap-3 animate-pulse">
              Syncing Protocol...
            </span>
          </button>

          <div class="mt-4 text-center">
            <p
              class="text-[9px] font-bold text-taupe-300 uppercase tracking-widest flex items-center justify-center gap-2 italic">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-2.5 h-2.5">
                <path fill-rule="evenodd"
                  d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z"
                  clip-rule="evenodd" />
              </svg>
              Encrypted Operational Audit
            </p>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
