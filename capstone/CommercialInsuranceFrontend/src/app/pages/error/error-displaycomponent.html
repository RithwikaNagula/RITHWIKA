<div
  class="min-h-screen bg-brand-50 dark:bg-brand-900 flex items-center justify-center p-6 transition-colors duration-500 relative overflow-hidden">
  <!-- Decorative Background -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div
      class="absolute top-[-20%] right-[-10%] w-[60%] h-[60%] bg-brand-200/20 dark:bg-brand-500/10 rounded-full blur-[160px]">
    </div>
    <div
      class="absolute bottom-[-20%] left-[-10%] w-[60%] h-[60%] bg-brand-300/20 dark:bg-brand-800/40 rounded-full blur-[160px]">
    </div>
  </div>

  <div class="max-w-xl w-full relative z-10 text-center">
    <div
      class="bg-white dark:bg-brand-800 rounded-[3rem] border border-brand-100 dark:border-brand-700/50 p-12 md:p-16 shadow-2xl shadow-brand-900/10 dark:shadow-black/60 transition-all duration-500 relative overflow-hidden">

      <!-- Floating Alert Icon -->
      <div
        class="w-24 h-24 bg-rose-100 dark:bg-rose-900/30 rounded-full flex items-center justify-center mx-auto mb-10 shadow-lg shadow-rose-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-rose-500 dark:text-rose-400" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>

      <!-- Status Code & Title -->
      <h2 style="font-family: 'Outfit', sans-serif;"
        class="text-7xl font-black text-brand-900 dark:text-white mb-4 tracking-tighter">
        {{ statusCode || 'Error' }}
      </h2>
      <h3 class="text-2xl font-bold text-brand-700 dark:text-brand-300 mb-6 tracking-tight">
        {{ errorTitle }}
      </h3>

      <!-- Dynamic Error Description -->
      <p class="text-brand-500 dark:text-brand-400 font-medium leading-relaxed mb-10">
        {{ errorDescription }}
      </p>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a [routerLink]="['/']"
          class="px-8 py-4 bg-brand-600 hover:bg-brand-700 text-white rounded-2xl font-black uppercase tracking-widest text-xs transition-all shadow-xl shadow-brand-500/20 active:scale-95 flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Return Home
        </a>
        <button (click)="onRetry()"
          class="px-8 py-4 bg-brand-50 dark:bg-brand-900 text-brand-800 dark:text-white border border-brand-200 dark:border-brand-700 hover:border-brand-500 rounded-2xl font-black uppercase tracking-widest text-xs transition-all active:scale-95 flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          Try Again
        </button>
      </div>

      <!-- Reference ID -->
      <div class="mt-12 pt-8 border-t border-brand-100 dark:border-brand-700/50">
        <p class="text-[10px] text-brand-400 font-bold uppercase tracking-[0.2em]">
          Reference ID: <span class="text-brand-600 dark:text-brand-300 font-black ml-1">{{ referenceId }}</span>
        </p>
      </div>
    </div>
  </div>
</div>
