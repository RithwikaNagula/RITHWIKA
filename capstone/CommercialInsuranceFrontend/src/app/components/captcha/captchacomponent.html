<div class="space-y-3">
    <!-- Display Row -->
    <div class="flex items-center gap-2">
        <!-- Canvas Container -->
        <div
            class="flex-1 h-12 bg-white dark:bg-brand-800 rounded-xl overflow-hidden border border-brand-100 dark:border-brand-700 shadow-inner">
            <canvas #captchaCanvas width="240" height="48" class="w-full h-full object-cover"></canvas>
        </div>

        <!-- Action Button -->
        <button type="button" (click)="refresh()"
            class="h-12 w-12 flex items-center justify-center bg-brand-500 hover:bg-brand-600 text-white rounded-xl shadow-lg shadow-brand-500/20 transition-all active:scale-90 group">
            <svg xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5 group-hover:rotate-180 transition-transform duration-500" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
        </button>
    </div>

    <!-- Input Row -->
    <div class="relative">
        <input id="captcha-input" type="text" [(ngModel)]="userInput" (ngModelChange)="onInput()"
            placeholder="Verification code" maxlength="6" autocomplete="off" spellcheck="false"
            class="w-full h-12 bg-white dark:bg-brand-900 border border-brand-100 dark:border-brand-700 rounded-xl px-5 text-sm font-bold tracking-widest text-brand-900 dark:text-white placeholder:text-brand-300 dark:placeholder:text-brand-600 focus:bg-white dark:focus:bg-brand-800 transition-all outline-none"
            [ngClass]="{
                'border-rose-400 ring-4 ring-rose-500/10 bg-rose-50/30': showError(),
                'border-emerald-400 ring-4 ring-emerald-500/10 bg-emerald-50/30 font-extrabold': isVerified(),
                'focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10': !showError() && !isVerified()
            }" />

        <!-- Inline Status -->
        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none flex items-center gap-1.5">
            <span *ngIf="isVerified()" class="text-emerald-500 animate-fade-in">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </span>
            <span *ngIf="showError()" class="text-rose-500 animate-fade-in">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </span>
        </div>
    </div>

    <!-- Error/Success Micro-text -->
    <div class="h-4 pl-1">
        <p *ngIf="showError()" class="text-[9px] font-black text-rose-500 uppercase tracking-widest animate-slide-up">
            Code mismatch
        </p>
        <p *ngIf="isVerified()"
            class="text-[9px] font-black text-emerald-500 uppercase tracking-widest animate-slide-up">
            Verified
        </p>
    </div>
</div>
