<div class="captcha-container">
    <!-- Canvas: compact, full-width with refresh button on the right -->
    <div class="captcha-canvas-wrap">
        <canvas #captchaCanvas width="400" height="52" class="captcha-canvas"></canvas>
        <button type="button" class="captcha-refresh" (click)="refresh()" title="Generate new code">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" class="refresh-icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25
             8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            <span>Refresh</span>
        </button>
    </div>

    <!-- Input field -->
    <div class="captcha-input-wrap" [class.captcha-verified]="isVerified()" [class.captcha-error]="showError()">
        <svg xmlns="http://www.w3.org/2000/svg" class="captcha-input-icon" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43
           L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1
           .43-1.563l5.912-7.029A6 6 0 0 1 21.75 8.25Z" />
        </svg>
        <input id="captcha-input" type="text" class="captcha-input" [(ngModel)]="userInput" (ngModelChange)="onInput()"
            placeholder="Enter code above" maxlength="6" autocomplete="off" spellcheck="false" />
        <!-- Status icons -->
        <span *ngIf="isVerified()" class="captcha-status-icon captcha-ok">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </span>
        <span *ngIf="showError()" class="captcha-status-icon captcha-err">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </span>
    </div>

    <!-- Feedback text -->
    <p *ngIf="showError()" class="captcha-msg captcha-msg--error">
        Incorrect code — please try again or refresh.
    </p>
    <p *ngIf="isVerified()" class="captcha-msg captcha-msg--ok">
        Verification successful!
    </p>

</div>
